# ------------------------------------------------------------
# Nome da aplicańŃo Spring
# Usado principalmente para logs, monitoramento e identificańŃo
# em ambientes com m·ltiplos servińos.
# ------------------------------------------------------------
spring.application.name=stock


# ------------------------------------------------------------
# Perfil ativo da aplicańŃo
#
# ${SPRING_PROFILES_ACTIVE:local}
# Significa:
# - Se existir varißvel de ambiente SPRING_PROFILES_ACTIVE,
#   ela serß usada.
# - Caso contrßrio, o valor padrŃo serß "local".
#
# Isso permite alternar entre:
# local, dev, prod, test, etc.
# ------------------------------------------------------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# ------------------------------------------------------------
# Porta onde o servidor Spring Boot irß rodar
#
# ${PORT:8080}
# - Se existir varißvel de ambiente PORT, usa ela.
# - Caso contrßrio, roda na porta 8080.
#
# Muito usado em deploy (ex: Heroku, Railway, Render, etc).
# ------------------------------------------------------------
server.port=${PORT:8080}


# ------------------------------------------------------------
# Estratķgia de criańŃo/atualizańŃo das tabelas pelo Hibernate
#
# update:
# - Cria tabelas se nŃo existirem
# - Atualiza estrutura sem apagar dados
#
# Outras opń§es:
# create      ? apaga e recria tudo
# create-drop ? recria e apaga ao finalizar
# validate    ? apenas valida estrutura
# none        ? nŃo faz nada
#
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update


# ------------------------------------------------------------
# Exibe no console os SQL gerados pelo Hibernate
#
# ┌til para debug e aprendizado.
# Em produńŃo normalmente deve ficar false.
# ------------------------------------------------------------
spring.jpa.show-sql=true


# ------------------------------------------------------------
# Formata o SQL exibido no console
#
# Deixa a query mais legĒvel:
# SELECT
#     p.id,
#     p.name
# FROM product p
# ------------------------------------------------------------
spring.jpa.properties.hibernate.format_sql=true